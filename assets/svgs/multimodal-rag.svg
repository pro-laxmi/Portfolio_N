<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" width="100%" height="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor" />
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; }
      .title { font-weight: bold; font-size: 16px; }
      .small { font-size: 13px; opacity: 0.8; }
      .label { font-size: 12px; font-weight: bold; fill: #3b82f6; }
      .node-bg { stroke: currentColor; stroke-width: 2; fill: currentColor; fill-opacity: 0.05; rx: 8; }
      .group-bg { stroke: currentColor; stroke-width: 1.5; stroke-dasharray: 6,4; fill: none; rx: 12; }
    </style>
  </defs>

  <!-- UI -->
  <rect x="400" y="30" width="200" height="60" class="node-bg" />
  <text x="500" y="65" fill="currentColor" text-anchor="middle" class="title">Streamlit Dashboard</text>

  <!-- INGESTION & SEARCH SPLIT -->
  <rect x="50" y="140" width="400" height="380" class="group-bg" />
  <text x="250" y="165" fill="currentColor" text-anchor="middle" class="title" opacity="0.6">Data Ingestion Pipeline</text>

  <rect x="550" y="140" width="400" height="380" class="group-bg" />
  <text x="750" y="165" fill="currentColor" text-anchor="middle" class="title" opacity="0.6">Query &amp; Retrieval Pipeline</text>

  <!-- INGESTION PIPELINE -->
  <rect x="70" y="190" width="160" height="40" class="node-bg" />
  <text x="150" y="215" fill="currentColor" text-anchor="middle" class="small">PDFs (PyMuPDF)</text>

  <rect x="270" y="190" width="160" height="40" class="node-bg" />
  <text x="350" y="215" fill="currentColor" text-anchor="middle" class="small">Audio (Whisper)</text>

  <rect x="70" y="260" width="360" height="40" class="node-bg" />
  <text x="250" y="285" fill="currentColor" text-anchor="middle" class="small">LangChain Text Splitter (Chunk: 1000)</text>

  <rect x="70" y="330" width="160" height="40" class="node-bg" />
  <text x="150" y="355" fill="currentColor" text-anchor="middle" class="small">all-MiniLM-L6-v2</text>

  <rect x="270" y="330" width="160" height="40" class="node-bg" />
  <text x="350" y="355" fill="currentColor" text-anchor="middle" class="small">Images + CLIP</text>

  <rect x="70" y="440" width="160" height="50" class="node-bg" />
  <text x="150" y="470" fill="currentColor" text-anchor="middle" class="title">ChromaDB</text>

  <rect x="270" y="440" width="160" height="50" class="node-bg" />
  <text x="350" y="470" fill="currentColor" text-anchor="middle" class="title">FAISS Index</text>

  <!-- Ingestion Arrows -->
  <path d="M 150 230 L 150 260" stroke="currentColor" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  <path d="M 350 230 L 350 260" stroke="currentColor" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  <path d="M 150 300 L 150 330" stroke="currentColor" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  <path d="M 350 300 L 350 330" stroke="currentColor" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  <path d="M 150 370 L 150 440" stroke="currentColor" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  <path d="M 350 370 L 350 440" stroke="currentColor" stroke-width="2" marker-end="url(#arrow)" fill="none" />

  <!-- QUERY PIPELINE -->
  <rect x="650" y="190" width="200" height="40" class="node-bg" />
  <text x="750" y="215" fill="currentColor" text-anchor="middle" class="small">Natural Language Query</text>

  <rect x="570" y="260" width="160" height="40" class="node-bg" />
  <text x="650" y="285" fill="currentColor" text-anchor="middle" class="small">MiniLM Embeddings</text>

  <rect x="770" y="260" width="160" height="40" class="node-bg" />
  <text x="850" y="285" fill="currentColor" text-anchor="middle" class="small">CLIP Text Embeddings</text>

  <rect x="650" y="330" width="200" height="40" class="node-bg" />
  <text x="750" y="355" fill="currentColor" text-anchor="middle" class="small">Cosine Similarity Search (k=5)</text>

  <!-- Query Arrows -->
  <path d="M 750 230 C 750 245, 650 245, 650 260" stroke="currentColor" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  <path d="M 750 230 C 750 245, 850 245, 850 260" stroke="currentColor" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  <path d="M 650 300 C 650 315, 750 315, 750 330" stroke="currentColor" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  <path d="M 850 300 C 850 315, 750 315, 750 330" stroke="currentColor" stroke-width="2" marker-end="url(#arrow)" fill="none" />

  <!-- Cross Pipeline DB connections (Visual Only) -->
  <path d="M 750 370 C 750 465, 430 465, 430 465" stroke="currentColor" stroke-width="2" marker-end="url(#arrow)" fill="none" stroke-dasharray="4,4" />
  <text x="600" y="455" class="label">Matches Context from Databases</text>

  <!-- GENERATION -->
  <rect x="250" y="580" width="500" height="120" class="group-bg" />
  <text x="500" y="605" fill="currentColor" text-anchor="middle" class="title" opacity="0.6">Generation Phase (Offline)</text>

  <rect x="280" y="630" width="200" height="50" class="node-bg" />
  <text x="380" y="660" fill="currentColor" text-anchor="middle" class="title">LangChain RetrievalQA</text>

  <rect x="520" y="630" width="200" height="50" class="node-bg" />
  <text x="620" y="660" fill="currentColor" text-anchor="middle" class="title">Ollama (Phi-3 LLM)</text>

  <!-- Arrows bottom section -->
  <path d="M 150 490 C 150 655, 280 655, 280 655" stroke="currentColor" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  <path d="M 480 655 L 520 655" stroke="currentColor" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  
  <path d="M 500 90 C 500 115, 250 115, 250 140" stroke="currentColor" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  <path d="M 500 90 C 500 115, 750 115, 750 140" stroke="currentColor" stroke-width="2" marker-end="url(#arrow)" fill="none" />

  <path d="M 720 655 C 900 655, 960 400, 960 60 C 960 60, 600 60, 600 60" stroke="currentColor" stroke-width="2" marker-end="url(#arrow)" fill="none" stroke-dasharray="4,4" />
  <text x="830" y="400" class="label">Stream Response</text>
  <text x="830" y="415" class="label">to Dashboard UI</text>
</svg>
