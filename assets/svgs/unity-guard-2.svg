<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <!-- Arrowhead -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
    </marker>
    <style>
      .box { fill: none; stroke: #333; stroke-width: 2; rx: 8; ry: 8; }
      .text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 14px; fill: #333; text-anchor: middle; }
      .text-bold { font-weight: bold; fill: #000; }
      .text-small { font-size: 12px; fill: #666; }
      .group-box { fill: none; stroke: #888; stroke-width: 1; stroke-dasharray: 5,5; rx: 8; ry: 8; }
      .line { fill: none; stroke: #333; stroke-width: 2; marker-end: url(#arrow); }
    </style>
  </defs>

  <!-- Data Sources -->
  <rect x="50" y="50" width="160" height="90" class="box" />
  <text x="130" y="75" class="text text-bold">Raw Corpora</text>
  <text x="130" y="95" class="text text-small">Indic-Align</text>
  <text x="130" y="110" class="text text-small">IndicCorpV2</text>
  <text x="130" y="125" class="text text-small">ShareChatAI/MACD</text>

  <path d="M 210 95 L 260 95" class="line" />

  <!-- Data Processing -->
  <rect x="270" y="50" width="160" height="90" class="box" />
  <text x="350" y="75" class="text text-bold">Data Pipeline</text>
  <text x="350" y="95" class="text text-small">Regex Cleaning</text>
  <text x="350" y="110" class="text text-small">Label Remapping</text>
  <text x="350" y="125" class="text text-small">380k+ Samples</text>

  <path d="M 430 95 L 480 95" class="line" />

  <!-- Base Model -->
  <rect x="490" y="50" width="160" height="90" class="box" />
  <text x="570" y="85" class="text text-bold">Base Model</text>
  <text x="570" y="105" class="text text-small">Qwen-3-1.5B-Instruct</text>

  <path d="M 570 140 L 570 180" class="line" />

  <!-- Training Method -->
  <rect x="490" y="190" width="160" height="60" class="box" />
  <text x="570" y="215" class="text text-bold">QLoRA Adapters</text>
  <text x="570" y="235" class="text text-small">4-bit Quantization</text>

  <path d="M 490 220 L 430 220" class="line" />
  <path d="M 490 220 L 470 220 L 470 310 L 430 310" class="line" />

  <!-- The Two Heads -->
  <rect x="270" y="190" width="150" height="60" class="box" />
  <text x="345" y="215" class="text text-bold">Binary Head</text>
  <text x="345" y="235" class="text text-small">SAFE / HARMFUL</text>

  <rect x="270" y="280" width="150" height="60" class="box" />
  <text x="345" y="305" class="text text-bold">Multiclass Head</text>
  <text x="345" y="325" class="text text-small">17 Safety Categories</text>

  <path d="M 270 220 L 190 220" class="line" />
  <path d="M 270 310 L 190 310" class="line" />

  <!-- Web Portal Group -->
  <rect x="10" y="170" width="170" height="180" class="group-box" />
  <text x="95" y="190" class="text text-bold">Web Interface</text>

  <rect x="20" y="205" width="150" height="50" class="box" />
  <text x="95" y="225" class="text text-bold">Predictions</text>
  <text x="95" y="240" class="text text-small">SAFE/HARMFUL</text>

  <rect x="20" y="285" width="150" height="50" class="box" />
  <text x="95" y="305" class="text text-bold">Predictions</text>
  <text x="95" y="320" class="text text-small">17 Categories</text>

</svg>
