        content: Selected for Avanti Fellows through the highly competitive Dakshana National Exam, showcasing academic potential and commitment to STEM.
      - title: Agrayodhi
        year: "2022"
        content: Received "Agrayodhi" by Sambad English for securing 97.6 percentage in 10th grade.
      - title: Inspire Award MANAK
        year: "2019"
        content: Built a 6-wheeled assistive prototype for stair navigation and won the Inspire Award MANAK (Regional Level).

  # projects
  projects:
    enable: false

  #Contact
  contact:
    enable: true
    content: My inbox is always open. Whether you have a question or just want to say hi, I’ll try my best to get back to you!
    btnName: Mail me
    btnLink: mailto:laxmidharpanda084@gmail.com

  footer:
    recentPosts:
      path: "blogs"
      count: 3
      title: Recent Work
      enable: true
      disableFeaturedImage: false
    socialNetworks:
      github: https://github.com/pro-laxmi
      linkedin: https://www.linkedin.com/in/laxmidhar-panda/
      leetcode: https://leetcode.com/hehe-lala-here
      codeforces: https://codeforces.com/profile/proo-laxmi
      instagram: https://www.instagram.com/laxmidhar_panda_/

  # List pages like blogs and posts
  listPages:
    disableFeaturedImage: false

  # Single pages like blog and post
  singlePages:
    socialShare: true
    readTime:
      enable: true
      content: "min read"
    scrollprogress:
      enable: true
    tags:
      openInNewTab: true

  customScripts: |-
    <style>
      #hero .hero-image img, .hero-image { transform: scale(1.15) !important; }
      #about .about-image img, .about-image { transform: scale(1.15) !important; }
    </style>
