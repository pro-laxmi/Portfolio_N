baseURL: "/"
languageCode: "en-us"
title: "Hugo Profile"
theme: hugo-profile
relativeURLs: true

# Multilingual configuration
defaultContentLanguage: "en"
defaultContentLanguageInSubdir: false

languages:
  en:
    languageName: "English"
    weight: 1
    contentDir: "content"
    menu:
      main:
        - identifier: about
          name: About
          title: About Me
          url: /#about
          weight: 1
        - identifier: projects
          name: Projects
          title: Projects
          url: /projects/
          weight: 2
        - identifier: blog
          name: Blog
          title: Blog posts
          url: /blogs
          weight: 3
        - identifier: experience
          name: Experience
          title: Experience
          url: /experience/
          weight: 4
        - identifier: education
          name: Education
          title: Education
          url: /education
          weight: 5
        - identifier: achievements
          name: Achievements
          title: Achievements
          url: /achievements
          weight: 6
        - identifier: gallery
          name: Gallery
          title: Image gallery
          url: /gallery
          weight: 7
        - identifier: contact
          name: Contact me
          title: Contact me
          url: /#contact
          weight: 8

outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
  page:
    - "HTML"
    - "RSS"

enableRobotsTXT: true

#services:
#googleAnalytics:
#id: G-MEASUREMENT_ID
#disqus:
#shortname: your-disqus-shortname

pagination:
  pagerSize: 3

markup:
  goldmark:
    renderer:
      unsafe: true

params:
  title: "Laxmidhar Panda"
  description: "A Junior Undergraduate (3rd Year) Computer Science and Engineering student at IIT Gandhinagar with a strong foundation in data structures, algorithms, databases, and software engineering."
  staticPath: "" # The path to serve the static files from
  favicon: "/fav.png"

  # Whether to serve bootstrap css and js files from CDN or not. Can be set to true, "css" or "js" to choose between
  # serving both, only the css, or only the js files through the CDN. Any other value will make so that CDN is not used.
  # Note the lack of "" in true, it should be of boolean type.
  useBootstrapCDN: false

  # If you want to load dynamically responsive images from Cloudinary
  # This requires your images to be uploaded + hosted on Cloudinary
  # Uncomment and change YOUR_CLOUD_NAME to the Cloud Name in your Cloudinary console
  # cloudinary_cloud_name: "YOUR_CLOUD_NAME"

  # Whether to add mathjax support on all pages. Alternatively, you can opt-in per page by adding `mathjax: true` in the frontmatter.
  mathjax: false

  # Whether the fade animations on the home page will be enabled
  animate: true

  theme:
    # disableThemeToggle: true
    defaultTheme: "light"

  font:
    fontSize: 1rem # default: 1rem
    fontWeight: 400 # default: 400
    lineHeight: 1.5 # default: 1.5
    textAlign: left # default: left

  # color preference
  # When using hex codes for colors, quotations must be used along with the # sign
  color:
    textColor: "#343a40"
    secondaryTextColor: "#6c757d"
    textLinkColor: "#007bff"
    backgroundColor: "#eaedf0"
    secondaryBackgroundColor: "#64ffda1a"
    primaryColor: "#007bff"
    secondaryColor: "#f8f9fa"

    darkmode:
      textColor: "#e4e6eb"
      secondaryTextColor: "#b0b3b8"
      textLinkColor: "#ffffff"
      backgroundColor: "#18191a"
      secondaryBackgroundColor: "#212529"
      primaryColor: "#ffffff"
      secondaryColor: "#212529"

  # If you want to customize the menu, you can change it here
  navbar:
    align: ms-auto # Left: ms-auto | center: mx-auto | right: me-auto | Default: ms-auto
    # brandLogo: "/logo.png" # Logo for the brand | default is the favicon variable
    showBrandLogo: false
    brandName: "Laxmidhar Panda" # Brand name for the brand | default is the title variable
    disableSearch: false
    # searchPlaceholder: "Search"
    stickyNavBar:
      enable: true
      showOnScrollUp: true
    enableSeparator: false
    menus:
      disableAbout: false
      disableExperience: true
      disableEducation: true
      disableProjects: true
      disableAchievements: true
      disableContact: false

  # Hero
  hero:
    enable: true
    intro: "Hi, my name is"
    title: "Laxmidhar Panda"
    subtitle: "Junior Undergraduate at IIT Gandhinagar"
    content:
      "I am a Junior Undergraduate studying Computer Science and Engineering at the Indian Institute of Technology Gandhinagar. I am deeply interested in artificial intelligence, scalable database systems, and full-stack development. My academic journey has been driven by a passion for solving complex computational problems and building performant systems.


      I have experience working with a diverse tech stack including PyTorch, React, PostgreSQL, and vector databases like Qdrant and FAISS, focusing on high-scale retrieval systems and AI-native applications."
    image: /images/me.jpeg
    bottomImage:
      enable: false
    button:
      enable: true
      name: "Resume"
      url: "https://drive.google.com/file/d/1WWFLhiALFLdKPy-ZUW_z5TeAGStwi23k/view?usp=sharing"
      download: false
      newPage: true
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-github
          url: https://github.com/pro-laxmi
        - icon: fab fa-linkedin
          url: https://www.linkedin.com/in/laxmidhar-panda/

  # About
  about:
    enable: false
    title: "About Me"
    image: "/images/me.jpeg"
    content: |-
      I am a Junior Undergraduate studying Computer Science and Engineering at the Indian Institute of Technology Gandhinagar. I am deeply interested in artificial intelligence, scalable database systems, and full-stack development. My academic journey has been driven by a passion for solving complex computational problems and building performant systems.

      I have experience working with a diverse tech stack including PyTorch, React, PostgreSQL, and vector databases like Qdrant and FAISS, focusing on high-scale retrieval systems and AI-native applications.
    skills:
      enable: false
      title: "Here are a few technologies I've been working with recently:"
      items:
        - "Python"
        - "C++"
        - "SQL"
        - "PyTorch"
        - "FastAPI"
        - "React"

  # Experience
  experience:
    enable: false
    items:
      - company: "TEDxIITGandhinagar"
        companyUrl: "https://tedxiitgandhinagar.com/"
        location: "Gandhinagar, Gujarat, India · On-site"
        duration: "1 yr 8 mos"
        jobs:
          - name: "Design and Tech Core"
            date: "Apr 2025 - Apr 2026 · 1 yr 1 mo"
            content: "Led and coordinated a cross-functional team of 80+ students to execute the TEDxIITGandhinagar event. Directed the 20-member Design & Tech team, overseeing content production and technical deliverables."
          - name: "Junior Graphic Designer"
            date: "Sep 2024 - Apr 2025 · 8 mos"
            content: "Graphic Design, Teamwork, Event Management"

      - company: "Amalthea, IIT Gandhinagar"
        location: "Gandhinagar, Gujarat, India · On-site"
        jobs:
          - name: "Event Executive"
            date: "Aug 2024 - Nov 2024 · 4 mos"
            content: "Event Planning, Communication, Event Management"

  # Education
  education:
    enable: false
    index: false
    items:
      - title: "B.Tech. in Computer Science and Engineering"
        school:
          name: "IIT Gandhinagar"
          url: "https://iitgn.ac.in"
        date: "2024 - Present"
        GPA: "CPI: 8.31"
        content: |-
          - Core focus on Data Structures, Algorithms, OOP, DBMS.
          - Built various projects spanning AI, deep learning, databases, and semantic search.
      - title: "High School Diploma, Science"
        school:
          name: "Avanti Fellows"
        date: "May 2022 – Apr 2024"
        GPA: "89.6"
        content: "Activities and societies: - JEE Advanced preparation (via Avanti Fellows)\n- Personal coding projects or school-level CS activities\n\nDone Higher Secondary Studies in Science (PCM + Computer Science) with high academic"
        skills: "Time Management, Student Discipline, +3 skills"
      - title: "10th, Science"
        school:
          name: "Jawahar Navodaya Vidyalaya - JNV"
        date: "Aug 2017 – May 2022"
        GPA: "97.6"
        content: "Activities and societies: - Built a 6-wheeled assistive prototype for stair navigation, winning the Inspire Award MANAK (Regional Level) demonstrating strong innovation, design thinking, public speaking, and Arduino engineering skills.\n- Played keyboard in the school band, performing in annual functions and inter-school events, balancing technical skills with creative expression.\n- Selected for Avanti Fellows through the highly competitive Dakshana National Exam, showcasing academic potential and commitment to STEM.\n\nAcademic high achiever with keen interest in co-curricular and technical pursuits. Ranked among the top of the class in Class 10 and received \"Agrayodhi\" by Sambad English for academic excellence. Also appeared in national-level fellowship examinations such as Dakshana and was chosen for Avanti Fellows for preparation of JEE."
        skills: "Time Management, Student Discipline, +8 skills"
      - title: "Primary Education"
        school:
          name: "Saraswati Vidhya Mandir"
        date: "Apr 2011 – Jul 2017"

  # Achievements
  achievements:
    enable: false
    items:
      - title: Competitive Programming
        year: "2023 - Present"
        content: Solved 200+ DSA problems on LeetCode and participated in programming contests on Codeforces and CodeChef.
      - title: JEE Advanced & Mains 2024
        year: "2024"
